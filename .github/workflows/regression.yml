name: EA Demo Regression Tests

on:
  # Manual trigger from the GitHub Actions UI
  # Allows choosing whether to UPDATE baselines or just compare
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Update baseline snapshots? (yes/no)"
        required: false
        default: "no"
      url_filter:
        description: "Optional URL substring filter (e.g. 'woo' for WooCommerce only)"
        required: false
        default: ""

  # Scheduled: run every Monday at 08:00 UTC to catch CDN / CMS drift
  schedule:
    - cron: "0 8 * * 1"

# Permissions required for GitHub Pages deployment and snapshot commits
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  regression:
    name: DOM Regression (${{ matrix.project }})
    runs-on: ubuntu-latest

    # Run desktop and mobile projects in parallel as separate matrix jobs
    strategy:
      fail-fast: false  # Let all matrix jobs finish even if one fails
      matrix:
        project: [desktop]

    steps:
      # ---------------------------------------------------------------
      # 1. Check out the repository (includes snapshots/ directory)
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # 2. Set up Node.js with npm caching
      # ---------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ---------------------------------------------------------------
      # 3. Install npm dependencies (Playwright + Slack reporter)
      # ---------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ---------------------------------------------------------------
      # 4. Install only the Chromium browser
      # ---------------------------------------------------------------
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ---------------------------------------------------------------
      # 5. Run regression tests
      #    SLACK_CHANNEL_ID  → set in repo Settings → Secrets
      #    SLACK_BOT_TOKEN   → set in repo Settings → Secrets
      #    PAGES_URL         → GitHub Pages URL shown in the Slack message
      # ---------------------------------------------------------------
      - name: Run regression tests
        env:
          CI: "true"
          URL_FILTER: ${{ github.event.inputs.url_filter || '' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PAGES_URL: "https://nahidthenh.github.io/playwright-e2e-ea-demos"
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "yes" ]; then
            echo "Updating baseline snapshots..."
            npx playwright test --project=${{ matrix.project }} --update-snapshots
          else
            echo "Running regression comparison..."
            npx playwright test --project=${{ matrix.project }}
          fi

      # ---------------------------------------------------------------
      # 6. Upload blob report for later merging (always, 1 day retention)
      #    The publish job downloads these and merges into one HTML report
      # ---------------------------------------------------------------
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project }}
          path: blob-report/
          retention-days: 1

      # ---------------------------------------------------------------
      # 7. Upload snapshot diffs on failure (14 day retention)
      # ---------------------------------------------------------------
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs-${{ matrix.project }}
          path: test-results/
          retention-days: 14

      # ---------------------------------------------------------------
      # 8. Commit updated snapshots back to the repo on manual dispatch
      # ---------------------------------------------------------------
      - name: Commit updated snapshots
        if: github.event.inputs.update_snapshots == 'yes'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet || git commit -m "chore: update regression snapshots [${{ matrix.project }}] [skip ci]"
          git push

  # ---------------------------------------------------------------
  # Merge both matrix reports and publish to GitHub Pages
  # Runs after both desktop + mobile jobs finish (pass or fail)
  # ---------------------------------------------------------------
  publish:
    name: Publish Report to GitHub Pages
    needs: regression
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------
      # Download blob reports from both matrix jobs into one folder
      # ---------------------------------------------------------------
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      # ---------------------------------------------------------------
      # Install Playwright so we can run merge-reports
      # ---------------------------------------------------------------
      - name: Install Playwright
        run: npm install @playwright/test

      # ---------------------------------------------------------------
      # Merge desktop + mobile blob reports into a single HTML report
      # ---------------------------------------------------------------
      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      # ---------------------------------------------------------------
      # Upload the merged report as a Pages artifact
      # ---------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      # ---------------------------------------------------------------
      # Deploy to GitHub Pages
      # ---------------------------------------------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
