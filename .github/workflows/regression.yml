name: EA Visual Regression

on:
  # ── Manual trigger ───────────────────────────────────────────────────────────
  # "baseline" → capture reference screenshots and save them as an artifact
  # "compare"  → download saved baseline, capture current, diff, publish report
  workflow_dispatch:
    inputs:
      mode:
        description: '"baseline" saves new reference screenshots | "compare" checks for regressions'
        required: true
        default: compare
        type: choice
        options:
          - compare
          - baseline

  # ── Weekly scheduled compare ─────────────────────────────────────────────────
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # needed to read/restore the cache

env:
  # schedule has no inputs — default to 'compare'
  RUN_MODE: ${{ github.event.inputs.mode || 'compare' }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Main job — captures screenshots and optionally compares them
  # ────────────────────────────────────────────────────────────────────────────
  visual-regression:
    name: Visual Regression — ${{ github.event.inputs.mode || 'compare' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Only Chromium is needed — desktop-only at 1920×1080
      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      # ════════════════════════════════════════════════════════════════════════
      # BASELINE MODE
      # Trigger manually BEFORE deploying a plugin update.
      # Go to: Actions → EA Visual Regression → Run workflow → mode: baseline
      # ════════════════════════════════════════════════════════════════════════

      - name: Capture baseline screenshots
        if: env.RUN_MODE == 'baseline'
        timeout-minutes: 30
        run: npm run baseline

      # Saves baseline PNGs to cache so compare runs can find them across runs.
      # The fixed key means a new baseline run always overwrites the previous one.
      - name: Save baseline to cache
        if: env.RUN_MODE == 'baseline'
        uses: actions/cache/save@v4
        with:
          path: screenshots/baseline/
          key: visual-regression-baseline

      # Also upload as artifact so the baseline PNGs can be downloaded manually.
      - name: Save baseline artifact
        if: env.RUN_MODE == 'baseline'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-baseline
          path: screenshots/baseline/
          retention-days: 90
          overwrite: true

      - name: Baseline complete
        if: env.RUN_MODE == 'baseline'
        run: |
          echo "✅ Baseline captured and saved as artifact 'visual-regression-baseline'."
          echo "   Now deploy your plugin update, then re-run with mode=compare."

      # ════════════════════════════════════════════════════════════════════════
      # COMPARE MODE  (default — also triggered by the weekly schedule)
      # Trigger manually AFTER deploying a plugin update.
      # ════════════════════════════════════════════════════════════════════════

      # Restore the previously saved baseline PNGs from cache (persists across runs)
      - name: Restore baseline screenshots
        if: env.RUN_MODE == 'compare'
        uses: actions/cache/restore@v4
        with:
          path: screenshots/baseline/
          key: visual-regression-baseline
          fail-on-cache-miss: true

      # Take fresh screenshots of the live site
      - name: Capture current screenshots
        if: env.RUN_MODE == 'compare'
        timeout-minutes: 30
        run: npm run current

      # Pixel-by-pixel diff — exits non-zero when any page fails.
      # continue-on-error so the report is always generated even on failure.
      - name: Compare screenshots
        if: env.RUN_MODE == 'compare'
        id: compare
        run: node compare.js
        continue-on-error: true

      # Generate the interactive HTML report
      - name: Generate HTML report
        if: env.RUN_MODE == 'compare'
        run: node report.js

      # Build a self-contained Pages folder.
      # report.html uses relative paths like ../screenshots/...
      # We copy everything under pages/ and rewrite the paths so they resolve
      # correctly when served from the GitHub Pages root.
      - name: Prepare GitHub Pages directory
        if: env.RUN_MODE == 'compare'
        run: |
          mkdir -p pages/screenshots
          cp -r screenshots/. pages/screenshots/
          sed 's|../screenshots/|screenshots/|g' reports/report.html > pages/index.html

      # Upload diff + current screenshots + report for local download.
      # Extract this artifact and open reports/report.html locally to see
      # full-resolution screenshots with working image paths.
      - name: Upload results artifact
        if: env.RUN_MODE == 'compare'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: |
            screenshots/diff/
            screenshots/current/
            reports/
          retention-days: 30

      - name: Upload Pages artifact
        if: env.RUN_MODE == 'compare'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      # Run aria snapshot tests. playwright.config.js wires up playwright-slack-report
      # on CI, so this step also sends the Slack notification automatically.
      # continue-on-error so aria failures don't mask pixel-comparison failures below.
      - name: Run aria tests + notify Slack
        if: env.RUN_MODE == 'compare'
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          # Pages URL is predictable: https://<owner>.github.io/<repo>/
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: npx playwright test --project=desktop

      # Fail the workflow run so the ❌ is visible in the Actions list
      - name: Fail on regressions
        if: env.RUN_MODE == 'compare' && steps.compare.outcome == 'failure'
        run: |
          echo "::error::Visual regressions detected — see the 'visual-regression-results' artifact or the GitHub Pages report."
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Publish the HTML report to GitHub Pages
  # Runs after the main job, even on failure, so you can always view the report.
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Report to GitHub Pages
    needs: visual-regression
    if: always() && (github.event.inputs.mode == 'compare' || github.event_name == 'schedule')
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
